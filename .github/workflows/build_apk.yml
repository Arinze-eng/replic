name: Build arm64-v8a APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Download libv2ray.aar
      run: |
        mkdir -p app/libs
        curl -L https://github.com/2dust/AndroidLibV2rayLite/releases/download/v5.49.0/libv2ray.aar -o app/libs/libv2ray.aar

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-arm64-v8a-debug
        path: app/build/outputs/apk/debug/*.apk
